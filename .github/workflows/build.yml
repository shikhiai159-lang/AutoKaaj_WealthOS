name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Buildozer and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev perl build-essential zlib1g-dev libssl-dev unzip openjdk-17-jdk cpio
          pip install --user --upgrade buildozer
      - name: Unzip and Build
        run: |
          unzip AutoKaaj_WealthOS_Colab.zip
          # অটোমেটিক ফোল্ডার খুঁজে বিল্ড শুরু করবে
          FOLDER=$(find . -maxdepth 1 -type d -name "Auto*")
          cd $FOLDER && buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoKaaj-APK
          path: ./**/bin/*.apk
